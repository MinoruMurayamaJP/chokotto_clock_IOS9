 <div class="panel">

<script>
(function(){
var VER='260620-0160 iOS9';
var STORE='chokottoClock_iOS9_v0160';
var colors=[['#00AEEF','水色'],['#5FD3DF','薄水色'],['#B065E8','紫'],['#E85CCB','ピンク紫'],['#F26D91','ピンク'],['#FF4C5E','赤'],['#FF633D','朱色'],['#FFB45C','オレンジ'],['#55D98C','薄緑'],['#55C878','緑'],['#58B947','濃緑'],['#A6DB45','黄緑'],['#5EA4F5','青'],['#5D6DF2','藍'],['#7D55E8','青紫'],['#7A8A93','グレー']];

function clone(o){return JSON.parse(JSON.stringify(o));}
function mix(a,b){var o=clone(a),k;for(k in b){if(b.hasOwnProperty(k)){if(typeof b[k]==='object'&&b[k]!==null&&!b[k].splice){o[k]=mix(o[k]||{},b[k]);}else{o[k]=b[k];}}}return o;}
function defaultForRatio(r){return clone(r==='19:9'?def19:def43);}
function load(){var raw=null;try{raw=JSON.parse(localStorage.getItem(STORE)||'null');}catch(e){}var st={ratio:'4:3',profiles:{'4:3':defaultForRatio('4:3'),'19:9':defaultForRatio('19:9')}};if(raw){st.ratio=raw.ratio==='19:9'?'19:9':'4:3';if(raw.profiles){if(raw.profiles['4:3'])st.profiles['4:3']=mix(defaultForRatio('4:3'),raw.profiles['4:3']);if(raw.profiles['19:9'])st.profiles['19:9']=mix(defaultForRatio('19:9'),raw.profiles['19:9']);}}
return st;}
var state=load();document.body.className=state.ratio==='19:9'?'layout19':'layout43';var mode=0;var full=false;var activeFull=null;
function cur(){return state.profiles[state.ratio];}
function save(){try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}}
function id(x){return document.getElementById(x);}
function pad(n){return n<10?'0'+n:''+n;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function shadeColor(hex,level){var h=hex.replace('#','');var r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);var t=level>0?0:255;var p=Math.abs(level)*0.13;if(level>0){r=Math.round(r*(1-p));g=Math.round(g*(1-p));b=Math.round(b*(1-p));}else if(level<0){r=Math.round(r+(255-r)*p);g=Math.round(g+(255-g)*p);b=Math.round(b+(255-b)*p);}function hx(v){v=Math.max(0,Math.min(255,v));var s=v.toString(16).toUpperCase();return s.length<2?'0'+s:s;}return '#'+hx(r)+hx(g)+hx(b);}
function stepColor(part,delta){var p=cur()[part];p.shade=Math.max(-4,Math.min(4,(p.shade||0)+delta));p.color=shadeColor(p.baseColor||p.color,p.shade);save();renderSettings();updateAll();}
function setBaseColor(part,c){var p=cur()[part];p.baseColor=c;p.shade=0;p.color=c;save();renderSettings();updateAll();}
function timeText(d,p){var h=d.getHours(),m=pad(d.getMinutes()),s=pad(d.getSeconds()),ap='';if(p.ampm==='12'){ap=h>=12?'PM':'AM';h=h%12;if(h===0)h=12;}else{h=pad(h);}var t=h+':'+m+(p.fmt==='hms'?':'+s:'');return ap?'<span class="ampm">'+ap+'</span>'+t:t;}
function dateText(d,p){var y=d.getFullYear(),yy=pad(y%100),m=pad(d.getMonth()+1),day=pad(d.getDate());var base=p.fmt==='ymd'?y+'/'+m+'/'+day:(p.fmt==='yy'?yy+'/'+m+'/'+day:m+'/'+day);var ws=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];var wf=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];var js=['日','月','火','水','木','金','土'];var jf=['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];var w='';if(p.weekFmt==='enShort')w=ws[d.getDay()];if(p.weekFmt==='enFull')w=wf[d.getDay()];if(p.weekFmt==='jaShort')w=js[d.getDay()];if(p.weekFmt==='jaFull')w=jf[d.getDay()];return w?base+' ('+w+')':base;}
function analogDateText(d,p){var y=d.getFullYear(),yy=pad(y%100),m=pad(d.getMonth()+1),day=pad(d.getDate());var base=yy+'/'+m+'/'+day;var ws=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];var wf=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];var js=['日','月','火','水','木','金','土'];var jf=['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];var w='';if(p.weekFmt==='enShort')w=ws[d.getDay()];if(p.weekFmt==='enFull')w=wf[d.getDay()];if(p.weekFmt==='jaShort')w=js[d.getDay()];if(p.weekFmt==='jaFull')w=jf[d.getDay()];return w?base+' ('+w+')':base;}
function place(el,p,scale){scale=scale||1;el.style.fontFamily=p.font;el.style.fontSize=(p.size*scale)+'px';el.style.color=p.color;el.style.left=p.pos==='center'?'50%':p.left+'%';el.style.top=(p.pos==='center'?p.topc:p.top)+'%';el.style.webkitTransform=p.pos==='center'?'translateX(-50%)':'none';el.style.transform=p.pos==='center'?'translateX(-50%)':'none';}
function drawStage(stage,tEl,dEl,canvas,d,profile,bgMode,scale){scale=scale||1;var isAnalog=(mode===2||mode===3);var isBlack=(bgMode==='black'||mode===1||mode===3);stage.style.background=isBlack?'#000':'#fff';stage.className=stage.className.replace(/ saved/g,'');if(isBlack)stage.className+=' saved';var tc=isBlack?'#fff':profile.time.color,dc=isBlack?'#fff':profile.date.color;tEl.innerHTML=timeText(d,profile.time);dEl.innerHTML=dateText(d,profile.date);tEl.style.color=tc;dEl.style.color=dc;if(isAnalog){canvas.style.display='block';drawAnalog(canvas,d,isBlack,profile);tEl.style.display='none';dEl.style.display='none';}else{canvas.style.display='none';place(tEl,profile.time,scale);place(dEl,profile.date,scale);tEl.style.zIndex=2;dEl.style.zIndex=2;tEl.style.display='block';dEl.style.display='block';}}
function drawAnalog(c,d,isBlack,p){var st=c.parentNode;var w=st.clientWidth,h=st.clientHeight;if(w<10||h<10)return;c.width=w;c.height=h;var ctx=c.getContext('2d');ctx.clearRect(0,0,w,h);var col=isBlack?'#fff':'#111';var dial=(p.time.clockSize||68);var r=Math.min(w,h)*(dial/200),cx=w/2,cy=h/2+4;ctx.strokeStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='bold '+Math.max(12,r*.16)+'px Arial';var i,ang,x,y;for(i=1;i<=12;i++){ang=(i/12)*Math.PI*2-Math.PI/2;x=cx+Math.cos(ang)*r*.82;y=cy+Math.sin(ang)*r*.82;ctx.fillText(String(i),x,y);}function hand(a,len,lw,color){ctx.save();ctx.translate(cx,cy);ctx.rotate(a);ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-len);ctx.stroke();ctx.restore();}var sec=d.getSeconds(),min=d.getMinutes()+sec/60,hr=(d.getHours()%12)+min/60;hand(hr/12*Math.PI*2,r*.50,6,col);hand(min/60*Math.PI*2,r*.72,4,col);hand(sec/60*Math.PI*2,r*.76,2,isBlack?'#ff8888':'#e11d48');ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();/* front text: draw last so hands never cover it */var txtCol=isBlack?'#fff':'#111';ctx.fillStyle=txtCol;ctx.textAlign='center';ctx.textBaseline='middle';var m=Math.min(w,h);if(p.time.analogTime==='on'){var ts=Math.max(8,Math.round(m*((p.time.analogSize||43)/1000)));ctx.font='bold '+ts+'px '+(p.time.font||'Arial');ctx.fillText(timeText(d,p.time),cx,Math.round(h*((p.time.analogTop||37)/100)));}var ds=Math.max(8,Math.round(m*((p.date.analogSize||25)/1000)));ctx.font='bold '+ds+'px '+(p.date.font||'Arial');ctx.fillText(analogDateText(d,p.date),cx,Math.round(h*((p.date.analogTop||63)/100)));}
function updateAll(){var d=new Date(),p=cur();var ls=id('liveStage'),ss=id('savedStage'),ps=id('phoneStage');if(!full){document.body.className=state.ratio==='19:9'?'layout19':'layout43';ls.className='stage '+(state.ratio==='19:9'?'ratio19':'');ss.className='stage saved '+(state.ratio==='19:9'?'ratio19':'');ps.className='stage '+(state.ratio==='19:9'?'ratio19':'');}id('ratioSel').value=state.ratio;if(full&&activeFull){document.body.className=(state.ratio==='19:9'?'layout19 ':'layout43 ')+'fullActive';setFullChrome(true,activeFull);activeFull.className='stage fs '+(state.ratio==='19:9'?'r19 ratio19 ':'r43 ')+(mode===1||mode===3?'blackFull':'whiteFull');}var fullScale=1;if(full&&activeFull){var bw=activeFull._baseW||activeFull.clientWidth||1;fullScale=Math.max(1,activeFull.clientWidth/bw);}drawStage(ls,id('liveTime'),id('liveDate'),id('liveAnalog'),d,p,'white',(full&&activeFull===ls)?fullScale:1);drawStage(ss,id('savedTime'),id('savedDate'),id('savedAnalog'),d,p,mode===0||mode===2?'white':'black',(full&&activeFull===ss)?fullScale:1);drawStage(ps,id('phoneTime'),id('phoneDate'),id('phoneAnalog'),d,p,'white',(full&&activeFull===ps)?fullScale:1);}
function colorHtml(part){var p=cur()[part],s='<div class="colorRow"><span class="colorCurrent"><span class="sw" style="background:'+p.color+'"></span></span><span class="colorCycle"><button type="button" class="stepBtn" data-cstep="'+part+'" data-d="-1">－</button><span class="colorCode">'+p.color+'</span><button type="button" class="stepBtn" data-cstep="'+part+'" data-d="1">＋</button></span></div><div class="colorPalette">';var i;for(i=0;i<colors.length;i++){s+='<button type="button" class="colorBtn '+((p.baseColor||p.color).toUpperCase()===colors[i][0].toUpperCase()?'on':'')+'" data-colorpart="'+part+'" data-color="'+colors[i][0]+'" title="'+colors[i][1]+'" style="background:'+colors[i][0]+'"></button>';}return s+'</div>';}
function fontOptions(val){var s='',i;for(i=0;i<fonts.length;i++)s+='<option '+(fonts[i]===val?'selected':'')+'>'+esc(fonts[i])+'</option>';return s;}
function stepLine(part,key,label){var v=cur()[part][key];return '<div class="stepLine"><span class="stepName">'+label+'</span><span class="stepper"><button type="button" class="stepBtn" data-step="'+part+'.'+key+'" data-d="-1">－</button><span class="stepVal">'+v+'</span><button type="button" class="stepBtn" data-step="'+part+'.'+key+'" data-d="1">＋</button></span></div>';}
function renderSettings(){var p=cur();var h='';h+='<div class="section"><h2>1. 時刻表示の設定</h2>';h+='<div class="row"><span class="label">表示形式</span><select id="timeFmt"><option value="hm">HH:MM</option><option value="hms">HH:MM:SS</option></select></div>';h+='<div class="row"><span class="label">時間制</span><select id="ampm"><option value="24">24時間</option><option value="12">12時間</option></select></div>';h+='<div class="row"><span class="label">アナログ時刻</span><select id="analogTime"><option value="on">表示</option><option value="off">非表示</option></select></div>';h+='<div class="row"><span class="label">色</span>'+colorHtml('time')+'</div>';h+='<div class="row"><span class="label">サイズ</span>'+stepLine('time','size','Size')+'</div>';h+='<div class="row"><span class="label">アナログ文字盤</span>'+stepLine('time','clockSize','Size')+'</div>';h+='<div class="row"><span class="label">アナログ時刻</span>'+stepLine('time','analogSize','Size')+stepLine('time','analogTop','Top')+'</div>';h+='<div class="row"><span class="label">フォント</span><select id="timeFont" class="fontsel">'+fontOptions(p.time.font)+'</select></div>';h+='<div class="row"><span class="label">位置</span><div class="radios"><label><input type="radio" name="timePos" value="tl"> Top / Left 指定</label></div>'+stepLine('time','top','Top')+stepLine('time','left','Left')+'<div class="radios"><label><input type="radio" name="timePos" value="center"> Top 指定センタリング</label></div>'+stepLine('time','topc','Top')+'</div></div>';
h+='<div class="section"><h2>2. 日付・曜日の設定</h2>';h+='<div class="row"><span class="label">日付形式</span><select id="dateFmt"><option value="ymd">yyyy/mm/dd</option><option value="yy">yy/mm/dd</option><option value="md">mm/dd</option></select></div>';h+='<div class="row"><span class="label">曜日形式</span><select id="weekFmt"><option value="enShort">英語短縮</option><option value="enFull">英語フル</option><option value="jaShort">日本語短縮</option><option value="jaFull">日本語フル</option><option value="none">非表示</option></select></div>';h+='<div class="row"><span class="label">色</span>'+colorHtml('date')+'</div>';h+='<div class="row"><span class="label">サイズ</span>'+stepLine('date','size','Size')+'</div>';h+='<div class="row"><span class="label">アナログ日付</span>'+stepLine('date','analogSize','Size')+stepLine('date','analogTop','Top')+'</div>';h+='<div class="row"><span class="label">フォント</span><select id="dateFont" class="fontsel">'+fontOptions(p.date.font)+'</select></div>';h+='<div class="row"><span class="label">位置</span><div class="radios"><label><input type="radio" name="datePos" value="tl"> Top / Left 指定</label></div>'+stepLine('date','top','Top')+stepLine('date','left','Left')+'<div class="radios"><label><input type="radio" name="datePos" value="center"> Top 指定センタリング</label></div>'+stepLine('date','topc','Top')+'</div></div>';
id('settings').innerHTML=h;setControls();attach();}
function setControls(){var p=cur();id('timeFmt').value=p.time.fmt;id('ampm').value=p.time.ampm;id('analogTime').value=p.time.analogTime;id('timeFont').value=p.time.font;id('dateFmt').value=p.date.fmt;id('weekFmt').value=p.date.weekFmt;id('dateFont').value=p.date.font;var a=document.getElementsByName('timePos'),i;for(i=0;i<a.length;i++)a[i].checked=a[i].value===p.time.pos;a=document.getElementsByName('datePos');for(i=0;i<a.length;i++)a[i].checked=a[i].value===p.date.pos;}
function stopEvent(e){if(!e)e=window.event;if(e.preventDefault)e.preventDefault();if(e.stopPropagation)e.stopPropagation();e.cancelBubble=true;return false;}
function updateStepDisplay(btn,val){var p=btn.parentNode;if(!p)return;var spans=p.getElementsByTagName('span'),i;for(i=0;i<spans.length;i++){if((' '+spans[i].className+' ').indexOf(' stepVal ')>=0){spans[i].innerHTML=val;break;}}}
function updateColorDisplay(btn,part){var row=btn;while(row&&(' '+row.className+' ').indexOf(' colorRow ')<0)row=row.parentNode;if(!row)return;var spans=row.getElementsByTagName('span'),i,p=cur()[part];for(i=0;i<spans.length;i++){if((' '+spans[i].className+' ').indexOf(' colorCode ')>=0)spans[i].innerHTML=p.color;if((' '+spans[i].className+' ').indexOf(' sw ')>=0)spans[i].style.background=p.color;}}
function doStep(btn){var a=btn.getAttribute('data-step').split('.'),d=parseInt(btn.getAttribute('data-d'),10);var v=Math.max(0,cur()[a[0]][a[1]]+d);cur()[a[0]][a[1]]=v;save();updateStepDisplay(btn,v);updateAll();}
function doColorStep(btn){var part=btn.getAttribute('data-cstep'),d=parseInt(btn.getAttribute('data-d'),10);var p=cur()[part];p.shade=Math.max(-4,Math.min(4,(p.shade||0)+d));p.color=shadeColor(p.baseColor||p.color,p.shade);save();updateColorDisplay(btn,part);updateAll();}
function bindRepeatButton(btn,action){var holdTimer=null,repeatTimer=null,active=false,lastTouch=0;
 function clear(){if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}if(repeatTimer){clearInterval(repeatTimer);repeatTimer=null;}setTimeout(function(){active=false;},250);}
 function start(e){active=true;if(e&&e.type&&e.type.indexOf('touch')===0)lastTouch=(new Date()).getTime();action(btn);if(holdTimer)clearTimeout(holdTimer);holdTimer=setTimeout(function(){repeatTimer=setInterval(function(){action(btn);},120);},400);return stopEvent(e);}
 btn.ontouchstart=start;btn.onmousedown=function(e){if((new Date()).getTime()-lastTouch<500)return stopEvent(e);return start(e);};
 btn.ontouchend=clear;btn.ontouchcancel=clear;btn.onmouseup=clear;btn.onmouseleave=clear;
 btn.onclick=function(e){return stopEvent(e);};
}
function attach(){function ch(idn,fn){var e=id(idn);if(e)e.onchange=fn;}ch('timeFmt',function(){cur().time.fmt=this.value;save();updateAll();});ch('ampm',function(){cur().time.ampm=this.value;save();updateAll();});ch('analogTime',function(){cur().time.analogTime=this.value;save();updateAll();});ch('timeFont',function(){cur().time.font=this.value;save();updateAll();});ch('dateFmt',function(){cur().date.fmt=this.value;save();updateAll();});ch('weekFmt',function(){cur().date.weekFmt=this.value;save();updateAll();});ch('dateFont',function(){cur().date.font=this.value;save();updateAll();});var els=document.getElementsByTagName('input'),i;for(i=0;i<els.length;i++){els[i].onchange=function(){if(this.name==='timePos')cur().time.pos=this.value;if(this.name==='datePos')cur().date.pos=this.value;save();updateAll();};}
els=document.getElementsByTagName('button');for(i=0;i<els.length;i++){
  if(els[i].getAttribute('data-step')){bindRepeatButton(els[i],doStep);continue;}
  if(els[i].getAttribute('data-cstep')){bindRepeatButton(els[i],doColorStep);continue;}
  if(els[i].getAttribute('data-colorpart'))els[i].onclick=function(e){setBaseColor(this.getAttribute('data-colorpart'),this.getAttribute('data-color'));return stopEvent(e);};
}}
function setFullChrome(on,stage){
 var hs=document.getElementsByClassName('head'),ms=document.getElementsByClassName('main'),ps=document.getElementsByClassName('phoneSticky'),i;
 for(i=0;i<hs.length;i++)hs[i].style.display=on?'none':'';
 for(i=0;i<ms.length;i++)ms[i].style.display=on?'none':'';
 for(i=0;i<ps.length;i++){
   ps[i].style.top=on?'0':'';ps[i].style.left=on?'0':'';ps[i].style.right=on?'0':'';ps[i].style.maxWidth=on?'none':'';ps[i].style.padding=on?'0':'';ps[i].style.border=on?'0':'';ps[i].style.background=on?'transparent':'';
 }
}
function openFull(stage){stage._baseW=stage.clientWidth||520;full=true;activeFull=stage;document.body.className=(state.ratio==='19:9'?'layout19 ':'layout43 ')+'fullActive';setFullChrome(true,stage);stage.className='stage fs '+(state.ratio==='19:9'?'r19 ratio19 ':'r43 ')+(mode===1||mode===3?'blackFull':'whiteFull');updateAll();}
function closeFull(){if(!full)return;full=false;activeFull=null;setFullChrome(false,null);document.body.className=state.ratio==='19:9'?'layout19':'layout43';updateAll();}
function initStage(stage){var sx=0,sy=0,timer=null,moved=false,touching=false,longClosed=false;function startPress(x,y){sx=x;sy=y;moved=false;longClosed=false;clearTimeout(timer);timer=setTimeout(function(){if(full){longClosed=true;closeFull();}},2000);}function doSwipe(dx,x){if(Math.abs(dx)>50){mode=(mode+(dx<0?1:3))%4;clearTimeout(timer);updateAll();sx=x;moved=true;}}
stage.ontouchstart=function(e){touching=true;if(e.touches&&e.touches.length){var t=e.touches[0];startPress(t.clientX,t.clientY);}return true;};
stage.ontouchmove=function(e){if(e.touches&&e.touches.length){var t=e.touches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(Math.abs(dx)>18||Math.abs(dy)>18)moved=true;if(Math.abs(dx)>Math.abs(dy))doSwipe(dx,t.clientX);}return true;};
stage.ontouchend=function(e){clearTimeout(timer);if(longClosed){setTimeout(function(){touching=false;longClosed=false;},300);return stopEvent(e);}if(!moved&&!full){openFull(stage);return stopEvent(e);}setTimeout(function(){touching=false;},300);return true;};
stage.onclick=function(e){if(touching)return stopEvent(e);if(!full){openFull(stage);return stopEvent(e);}return true;};
stage.onmousedown=function(e){startPress(e.clientX,e.clientY);};
stage.onmousemove=function(e){if(e.buttons){var dx=e.clientX-sx;if(Math.abs(dx)>50)doSwipe(dx,e.clientX);}};
stage.onmouseup=function(e){clearTimeout(timer);if(longClosed){longClosed=false;return stopEvent(e);}if(!moved&&!full){openFull(stage);return stopEvent(e);}return true;};}
document.onselectstart=function(e){var t=e?e.target:window.event.srcElement;var n=t&&t.tagName?t.tagName.toLowerCase():'';if(n==='select'||n==='option')return true;return false;};
id('ratioSel').onchange=function(){state.ratio=this.value;save();renderSettings();updateAll();};id('resetBtn').onclick=function(){state.profiles[state.ratio]=defaultForRatio(state.ratio);save();renderSettings();updateAll();};initStage(id('liveStage'));initStage(id('savedStage'));initStage(id('phoneStage'));renderSettings();updateAll();setInterval(updateAll,1000);
})();
</script>
